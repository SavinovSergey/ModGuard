version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: toxicfilter-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - API_PREFIX=/api/v1
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/toxicfilter
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: toxicfilter-frontend
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: toxicfilter-worker
    command: ["python", "scripts/run/run_worker.py"]
    environment:
      - MODEL_TYPE=regex
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/toxicfilter
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "scripts/run/healthcheck_worker.py"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: toxicfilter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    container_name: toxicfilter-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=toxicfilter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: toxicfilter-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_LOG_LEVEL=warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  listener-telegram:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: toxicfilter-listener-telegram
    command: ["python", "scripts/run/run_listener_telegram.py"]
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/toxicfilter
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "scripts/run/healthcheck_rabbitmq.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - telegram

  actions-telegram:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: toxicfilter-actions-telegram
    command: ["python", "scripts/run/run_actions_telegram.py"]
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "scripts/run/healthcheck_rabbitmq.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - telegram

volumes:
  redis_data:
  postgres_data:




