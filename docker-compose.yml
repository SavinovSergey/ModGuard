version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: toxicfilter-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_TYPE=regex
      - LOG_LEVEL=INFO
      - API_PREFIX=/api/v1
    volumes:
      # Для разработки: монтируем код (опционально)
      # - ./app:/app/app
      # Для моделей (если будут храниться локально)
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



